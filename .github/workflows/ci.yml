name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.23", "1.24", "1.25"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test (race detector)
        run: go test -race -timeout 120s ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.5.0

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build (linux/amd64)
        run: GOOS=linux GOARCH=amd64 go build -o /dev/null ./cmd/shtrace

      - name: Build (darwin/amd64)
        run: GOOS=darwin GOARCH=amd64 go build -o /dev/null ./cmd/shtrace

      - name: Build (darwin/arm64)
        run: GOOS=darwin GOARCH=arm64 go build -o /dev/null ./cmd/shtrace

  integration:
    name: Integration test (dogfooding)
    runs-on: ubuntu-latest
    # Gate on test + build so a broken unit test or compile error short-circuits
    # this job — the dogfooding run would otherwise duplicate the same failure
    # signal and waste a runner slot.
    needs: [test, build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build shtrace
        run: go build -o shtrace ./cmd/shtrace

      - name: Run integration test
        # Wraps scripts/integration-test.sh under the freshly-built shtrace
        # binary and then asserts on the recorded state. SHTRACE_DATA_DIR is
        # pinned to a fresh tempdir so the session/span count assertions are
        # deterministic.
        run: |
          set -euo pipefail
          export PATH="$PWD:$PATH"
          export SHTRACE_DATA_DIR="$(mktemp -d)"
          shtrace bash scripts/integration-test.sh
          bash scripts/integration-test-verify.sh
