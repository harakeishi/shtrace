name: shtrace sample workflow

# This is a sample workflow showing how to integrate shtrace into a CI pipeline
# for PR verification. Copy this into your own repository and adapt as needed.
#
# What it does:
#   1. Builds shtrace from source and records test execution
#   2. Exports the session as a tar.gz artifact (with HTML report)
#   3. Posts a summary comment on the PR with test results and download instructions

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  shtrace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build shtrace from source
        run: go build -o "$(go env GOPATH)/bin/shtrace" ./cmd/shtrace

      - name: Run tests with shtrace
        run: shtrace -- go test ./...
        # GitHub Actions automatically sets GITHUB_ACTIONS=true and
        # GITHUB_WORKSPACE, so shtrace stores data under $GITHUB_WORKSPACE/.shtrace.

      - name: Export session as artifact
        if: always()
        run: shtrace export --latest --with-report --output shtrace-report.tar.gz

      - name: Upload shtrace artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shtrace-report
          path: shtrace-report.tar.gz
          retention-days: 30

      - name: Post PR comment
        if: always() && github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shtrace pr-comment --latest --pr "${{ github.event.pull_request.number }}"
