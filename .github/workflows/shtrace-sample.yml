name: shtrace sample workflow

# This is a sample workflow showing how to integrate shtrace into a CI pipeline
# for PR verification. Copy this into your own repository and adapt as needed.
#
# What it does:
#   1. Builds shtrace and records test execution via `shtrace -- go test ./...`
#   2. Generates a self-contained HTML report
#   3. Exports the session as a tar.gz artifact
#   4. Posts a summary comment on the PR with test results and download instructions

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  shtrace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install shtrace
        run: go install github.com/harakeishi/shtrace/cmd/shtrace@latest

      - name: Run tests with shtrace
        run: shtrace -- go test ./...
        # Propagate SHTRACE_SESSION_ID so nested shtrace calls join the same session.
        # GitHub Actions automatically sets GITHUB_ACTIONS=true and
        # GITHUB_WORKSPACE, so shtrace stores data under $GITHUB_WORKSPACE/.shtrace.

      - name: Generate HTML report
        if: always()
        run: shtrace export --latest --with-report --output shtrace-report.tar.gz

      - name: Upload shtrace artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shtrace-report
          path: shtrace-report.tar.gz
          retention-days: 30

      - name: Post PR comment
        if: always() && github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shtrace pr-comment --latest --pr "${{ github.event.pull_request.number }}"
